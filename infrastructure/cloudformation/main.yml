AWSTemplateFormatVersion: '2010-09-09'
Description: 'Main stack for student site template - orchestrates frontend and backend stacks'

Parameters:
  ProjectName:
    Type: String
    Default: student-site
    Description: Name of the project

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for custom domain

  FrontendDomain:
    Type: String
    Default: www
    Description: Subdomain for frontend (www or @)

  BackendDomain:
    Type: String
    Default: api
    Description: Subdomain for backend API

  BaseDomain:
    Type: String
    Description: Base domain name (e.g., example.com)

  # Bucket must already exist and contain frontend-stack.yml + backend-stack.yml (CI uploads before deploy).
  # Using Ref to a bucket created in the same template fails AWS::EarlyValidation::ResourceExistenceCheck.
  TemplatesBucketName:
    Type: String
    Description: Existing S3 bucket name holding nested stack templates

  # ECR repo is created by CI before this stack; pass URI so we do not duplicate AWS::ECR::Repository here.
  ECRRepositoryUri:
    Type: String
    Description: Full ECR repository URI (e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/my-repo)

Resources:
  FrontendStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/frontend-stack.yml'
      Parameters:
        ProjectName: !Ref ProjectName
        HostedZoneId: !Ref HostedZoneId
        FrontendDomain: !Ref FrontendDomain
        BackendDomain: !Ref BackendDomain
        BaseDomain: !Ref BaseDomain

  BackendStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/backend-stack.yml'
      Parameters:
        ProjectName: !Ref ProjectName
        HostedZoneId: !Ref HostedZoneId
        BackendDomain: !Ref BackendDomain
        BaseDomain: !Ref BaseDomain
        ECRRepositoryUri: !Ref ECRRepositoryUri

Outputs:
  ArtifactsBucketName:
    Description: S3 bucket holding nested stack templates
    Value: !Ref TemplatesBucketName
    Export:
      Name: !Sub '${ProjectName}-ArtifactsBucket'

  ECRRepositoryUri:
    Description: URI of the ECR repository
    Value: !Ref ECRRepositoryUri
    Export:
      Name: !Sub '${ProjectName}-ECRRepositoryUri'

  FrontendURL:
    Description: Frontend application URL
    Value: !GetAtt FrontendStack.Outputs.FrontendURL

  BackendURL:
    Description: Backend API URL
    Value: !GetAtt BackendStack.Outputs.BackendURL
