# Deploys / updates the Amplify Hosting stack (CloudFormation).
# Prerequisites:
# 1) IAM role github-role (286103605609) trusts GitHub OIDC for this repo.
# 2) GitHub repo secret AMPLIFY_GITHUB_TOKEN — PAT with repo + webhook access for Amplify.
# 3) Optional: repo variable AWS_REGION (default us-east-1), AMPLIFY_STACK_NAME (default student-site-amplify).

name: Deploy Amplify (CloudFormation)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Job-level permissions: required for OIDC (some orgs ignore workflow-level only).
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.AMPLIFY_STACK_NAME || 'student-site-amplify' }}
      GITHUB_OWNER: ${{ vars.GITHUB_OWNER || 'alexkoenig47' }}
      GITHUB_REPO: ${{ vars.GITHUB_REPO || 'student-site-template' }}
      GITHUB_BRANCH: ${{ vars.GITHUB_BRANCH || 'main' }}
      AMPLIFY_APP_NAME: ${{ vars.AMPLIFY_APP_NAME || 'student-site-template' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If this fails: repo/org is blocking OIDC (Workflow permissions) or job has no id-token: write.
      - name: Check GitHub OIDC is available
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::GitHub did not inject OIDC env vars. Fix: repo Settings → Actions → General → Workflow permissions → Read and write; ensure this job has permissions.id-token: write; check org Actions policies."
            exit 1
          fi
          echo "OIDC request URL is set (length ${#ACTIONS_ID_TOKEN_REQUEST_URL})."

      # Manual OIDC + STS so logs show the real error (GitHub HTTP vs IAM trust).
      - name: Assume AWS role via GitHub OIDC
        env:
          AWS_ROLE_ARN: arn:aws:iam::286103605609:role/github-role
        run: |
          set -euo pipefail
          REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          if [[ "${REQ_URL}" == *"?"* ]]; then
            REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"
          else
            REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"
          fi
          echo "Fetching GitHub OIDC token (audience=sts.amazonaws.com)..."
          HTTP_BODY=$(mktemp)
          HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${REQ_URL}")
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::GitHub OIDC token request failed with HTTP ${HTTP_CODE}"
            cat "${HTTP_BODY}"
            exit 1
          fi
          WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
          rm -f "${HTTP_BODY}"
          if [ -z "${WEB_IDENTITY_TOKEN}" ] || [ "${WEB_IDENTITY_TOKEN}" = "null" ]; then
            echo "::error::GitHub OIDC response had no .value JWT"
            exit 1
          fi
          echo "Calling sts:AssumeRoleWithWebIdentity for ${AWS_ROLE_ARN}..."
          set +e
          CREDS_JSON=$(aws sts assume-role-with-web-identity \
            --role-arn "${AWS_ROLE_ARN}" \
            --role-session-name "gha-${{ github.run_id }}" \
            --web-identity-token "${WEB_IDENTITY_TOKEN}" \
            --duration-seconds 3600 \
            --output json 2>&1)
          STS_RC=$?
          set -e
          if [ "${STS_RC}" -ne 0 ]; then
            echo "::error::AssumeRoleWithWebIdentity failed — IAM trust policy or OIDC provider mismatch. AWS CLI output:"
            echo "${CREDS_JSON}"
            echo "Fix: IAM role trust must allow token.actions.githubusercontent.com, aud=sts.amazonaws.com, and sub matching this repo (e.g. repo:alexkoenig47/student-site-template:ref:refs/heads/main)."
            exit 1
          fi
          AK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.AccessKeyId')
          SK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SecretAccessKey')
          ST=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SessionToken')
          echo "::add-mask::${AK}"
          echo "::add-mask::${SK}"
          echo "::add-mask::${ST}"
          echo "AWS_ACCESS_KEY_ID=${AK}" >> "${GITHUB_ENV}"
          echo "AWS_SECRET_ACCESS_KEY=${SK}" >> "${GITHUB_ENV}"
          echo "AWS_SESSION_TOKEN=${ST}" >> "${GITHUB_ENV}"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "${GITHUB_ENV}"
          echo "AWS_REGION=us-east-1" >> "${GITHUB_ENV}"
          echo "OK — temporary AWS credentials loaded for this job."

      - name: Deploy CloudFormation stack
        env:
          GH_TOKEN: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret AMPLIFY_GITHUB_TOKEN. Add a GitHub PAT under Settings → Secrets and variables → Actions."
            exit 1
          fi
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file infrastructure/amplify-app.yaml \
            --capabilities CAPABILITY_IAM \
            --region "${AWS_REGION}" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "GitHubAccessToken=${GH_TOKEN}" \
              "GitHubOwner=${GITHUB_OWNER}" \
              "GitHubRepo=${GITHUB_REPO}" \
              "GitHubBranch=${GITHUB_BRANCH}" \
              "AppName=${AMPLIFY_APP_NAME}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs" \
            --output table
