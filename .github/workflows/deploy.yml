name: Deploy Full Stack Application

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    AWS_REGION: us-east-1
    PROJECT_NAME: ${{ secrets.PROJECT_NAME || 'student-site' }}
    HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
    BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
    FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN || 'www' }}
    BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN || 'api' }}
    GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}

jobs:
    deploy:
        name: Deploy Infrastructure and Application
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Avoid aws-actions/configure-aws-credentials (opaque errors). Same pattern as deploy-amplify.yml.
            - name: Check GitHub OIDC is available
              run: |
                  if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
                    echo "::error::OIDC env vars missing. Set repo Actions → Workflow permissions (Read and write) and id-token: write on the job."
                    exit 1
                  fi

            - name: Assume AWS role via GitHub OIDC
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set -euo pipefail
                  AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"
                  REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                  if [[ "${REQ_URL}" == *"?"* ]]; then
                    REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"
                  else
                    REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"
                  fi
                  echo "Fetching GitHub OIDC token..."
                  HTTP_BODY=$(mktemp)
                  HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" \
                    -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                    "${REQ_URL}")
                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "::error::GitHub OIDC token request failed HTTP ${HTTP_CODE}"
                    cat "${HTTP_BODY}"
                    exit 1
                  fi
                  WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
                  rm -f "${HTTP_BODY}"
                  if [ -z "${WEB_IDENTITY_TOKEN}" ] || [ "${WEB_IDENTITY_TOKEN}" = "null" ]; then
                    echo "::error::No JWT in OIDC response"
                    exit 1
                  fi
                  echo "Assuming role ${AWS_ROLE_ARN}..."
                  set +e
                  CREDS_JSON=$(aws sts assume-role-with-web-identity \
                    --role-arn "${AWS_ROLE_ARN}" \
                    --role-session-name "gha-deploy-${{ github.run_id }}" \
                    --web-identity-token "${WEB_IDENTITY_TOKEN}" \
                    --duration-seconds 3600 \
                    --output json 2>&1)
                  STS_RC=$?
                  set -e
                  if [ "${STS_RC}" -ne 0 ]; then
                    echo "::error::AssumeRoleWithWebIdentity failed:"
                    echo "${CREDS_JSON}"
                    exit 1
                  fi
                  AK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.AccessKeyId')
                  SK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SecretAccessKey')
                  ST=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SessionToken')
                  echo "::add-mask::${AK}"
                  echo "::add-mask::${SK}"
                  echo "::add-mask::${ST}"
                  echo "AWS_ACCESS_KEY_ID=${AK}" >> "${GITHUB_ENV}"
                  echo "AWS_SECRET_ACCESS_KEY=${SK}" >> "${GITHUB_ENV}"
                  echo "AWS_SESSION_TOKEN=${ST}" >> "${GITHUB_ENV}"
                  echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> "${GITHUB_ENV}"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Validate required deployment inputs
              run: |
                  set -euo pipefail
                  missing=0
                  for v in HOSTED_ZONE_ID BASE_DOMAIN FRONTEND_DOMAIN BACKEND_DOMAIN PROJECT_NAME; do
                    if [ -z "${!v:-}" ]; then
                      echo "::error::Missing required value: ${v}. Set it in repo Settings -> Secrets and variables -> Actions."
                      missing=1
                    fi
                  done
                  if [ "${missing}" -ne 0 ]; then
                    exit 1
                  fi

            - name: Install AWS CLI and CloudFormation dependencies
              run: |
                  pip install boto3 awscli

            - name: Create or verify artifacts bucket
              id: artifacts-bucket
              run: |
                  BUCKET_NAME="${PROJECT_NAME}-artifacts-$(aws sts get-caller-identity --query Account --output text)"

                  if aws s3 ls "s3://${BUCKET_NAME}" 2>&1 | grep -q 'NoSuchBucket'; then
                    echo "Creating artifacts bucket: ${BUCKET_NAME}"
                    aws s3 mb "s3://${BUCKET_NAME}" --region ${AWS_REGION}
                    aws s3api put-bucket-versioning \
                      --bucket "${BUCKET_NAME}" \
                      --versioning-configuration Status=Enabled
                  else
                    echo "Artifacts bucket already exists: ${BUCKET_NAME}"
                  fi

                  echo "bucket_name=${BUCKET_NAME}" >> $GITHUB_OUTPUT

            - name: Create or verify ECR repository
              id: ecr-repo
              run: |
                  REPO_NAME="${PROJECT_NAME}-backend"
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO_NAME}"

                  if ! aws ecr describe-repositories --repository-names "${REPO_NAME}" --region ${AWS_REGION} 2>/dev/null; then
                    echo "Creating ECR repository: ${REPO_NAME}"
                    aws ecr create-repository \
                      --repository-name "${REPO_NAME}" \
                      --region ${AWS_REGION} \
                      --image-scanning-configuration scanOnPush=true
                  else
                    echo "ECR repository already exists: ${REPO_NAME}"
                  fi

                  echo "repository_uri=${REPO_URI}" >> $GITHUB_OUTPUT

            - name: Upload CloudFormation templates to S3
              run: |
                  aws s3 cp infrastructure/cloudformation/frontend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/frontend-stack.yml"
                  aws s3 cp infrastructure/cloudformation/backend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/backend-stack.yml"

            # Run before Docker so long builds do not eat the wait budget. ACM/DNS/ECS can keep CREATE_IN_PROGRESS for an hour+.
            - name: Remove failed CloudFormation stack if needed
              run: |
                  set -e
                  STACK_NAME="${PROJECT_NAME}-main"
                  WAIT_SEC=30
                  MAX_WAIT_ROUNDS=240
                  round=0
                  while true; do
                    STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "${AWS_REGION}" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
                    if [ "${STATUS}" = "DOES_NOT_EXIST" ]; then
                      echo "Stack ${STACK_NAME}: no stack; deploy will create it."
                      exit 0
                    fi
                    case "${STATUS}" in
                      *IN_PROGRESS)
                        round=$((round + 1))
                        if [ "${round}" -ge "${MAX_WAIT_ROUNDS}" ]; then
                          echo "::error::Stack still ${STATUS} after $((MAX_WAIT_ROUNDS * WAIT_SEC / 60)) minutes. Common causes: ACM certificate DNS validation pending, or a wedged create. Fix Route53 records or delete the stack from the console if rollback never finishes."
                          echo ""
                          echo "Recent root stack events (${STACK_NAME}):"
                          aws cloudformation describe-stack-events \
                            --stack-name "$STACK_NAME" \
                            --region "${AWS_REGION}" \
                            --max-items 30 \
                            --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceStatusReason]' \
                            --output table 2>/dev/null || true
                          echo ""
                          for NESTED in $(aws cloudformation describe-stack-resources \
                            --stack-name "$STACK_NAME" \
                            --region "${AWS_REGION}" \
                            --query "StackResources[?ResourceType=='AWS::CloudFormation::Stack'].PhysicalResourceId" \
                            --output text 2>/dev/null); do
                            [ -z "${NESTED}" ] && continue
                            echo "Nested stack events (${NESTED}):"
                            aws cloudformation describe-stack-events \
                              --stack-name "${NESTED}" \
                              --region "${AWS_REGION}" \
                              --max-items 20 \
                              --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceStatusReason]' \
                              --output table 2>/dev/null || true
                            echo ""
                          done
                          exit 1
                        fi
                        if [ "${round}" -eq 1 ] || [ $((round % 5)) -eq 0 ]; then
                          echo "Stack ${STACK_NAME} status: ${STATUS} — waited $((round * WAIT_SEC / 60))m / max $((MAX_WAIT_ROUNDS * WAIT_SEC / 60))m (${round}/${MAX_WAIT_ROUNDS})"
                        fi
                        sleep "${WAIT_SEC}"
                        ;;
                      *)
                        echo "Stack ${STACK_NAME} stable status: ${STATUS}"
                        break
                        ;;
                    esac
                  done

                  case "${STATUS}" in
                    ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED)
                      echo "Deleting stack (cannot update from ${STATUS})..."
                      aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "${AWS_REGION}"
                      if ! aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${AWS_REGION}"; then
                        echo "Normal delete failed. Retrying with FORCE_DELETE_STACK..."
                        aws cloudformation delete-stack \
                          --stack-name "$STACK_NAME" \
                          --region "${AWS_REGION}" \
                          --deletion-mode FORCE_DELETE_STACK
                        aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${AWS_REGION}"
                      fi
                      echo "Deleted (or force-deleted). Deploy step will create a fresh stack."
                      ;;
                    *)
                      echo "Proceeding with deploy (update existing stack or create if deleted above)."
                      ;;
                  esac

            - name: Refresh AWS role credentials before build/deploy
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set -euo pipefail
                  AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"
                  REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                  if [[ "${REQ_URL}" == *"?"* ]]; then
                    REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"
                  else
                    REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"
                  fi
                  echo "Refreshing AWS credentials via GitHub OIDC..."
                  HTTP_BODY=$(mktemp)
                  HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" \
                    -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                    "${REQ_URL}")
                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "::error::GitHub OIDC token request failed HTTP ${HTTP_CODE}"
                    cat "${HTTP_BODY}"
                    exit 1
                  fi
                  WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
                  rm -f "${HTTP_BODY}"
                  if [ -z "${WEB_IDENTITY_TOKEN}" ] || [ "${WEB_IDENTITY_TOKEN}" = "null" ]; then
                    echo "::error::No JWT in OIDC response"
                    exit 1
                  fi
                  CREDS_JSON=$(aws sts assume-role-with-web-identity \
                    --role-arn "${AWS_ROLE_ARN}" \
                    --role-session-name "gha-refresh-${{ github.run_id }}" \
                    --web-identity-token "${WEB_IDENTITY_TOKEN}" \
                    --duration-seconds 3600 \
                    --output json)
                  AK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.AccessKeyId')
                  SK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SecretAccessKey')
                  ST=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SessionToken')
                  echo "::add-mask::${AK}"
                  echo "::add-mask::${SK}"
                  echo "::add-mask::${ST}"
                  echo "AWS_ACCESS_KEY_ID=${AK}" >> "${GITHUB_ENV}"
                  echo "AWS_SECRET_ACCESS_KEY=${SK}" >> "${GITHUB_ENV}"
                  echo "AWS_SESSION_TOKEN=${ST}" >> "${GITHUB_ENV}"
                  echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> "${GITHUB_ENV}"

            - name: Build and push Docker image
              id: docker-build
              run: |
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-backend"

                  # Login to ECR
                  aws ecr get-login-password --region ${AWS_REGION} | \
                    docker login --username AWS --password-stdin ${REPO_URI}

                  # Build Docker image
                  docker build -t ${PROJECT_NAME}-backend:latest ./backend
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:latest
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:${GITHUB_SHA}

                  # Push to ECR
                  docker push ${REPO_URI}:latest
                  docker push ${REPO_URI}:${GITHUB_SHA}

                  echo "image_uri=${REPO_URI}:latest" >> $GITHUB_OUTPUT

            - name: Deploy CloudFormation main stack
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set +e
                  STACK_NAME="${PROJECT_NAME}-main"
                  aws cloudformation deploy \
                    --template-file infrastructure/cloudformation/main.yml \
                    --stack-name "${STACK_NAME}" \
                    --parameter-overrides \
                      ProjectName=${PROJECT_NAME} \
                      HostedZoneId=${HOSTED_ZONE_ID} \
                      FrontendDomain=${FRONTEND_DOMAIN} \
                      BackendDomain=${BACKEND_DOMAIN} \
                      BaseDomain=${BASE_DOMAIN} \
                      TemplatesBucketName=${{ steps.artifacts-bucket.outputs.bucket_name }} \
                      ECRRepositoryUri=${{ steps.ecr-repo.outputs.repository_uri }} \
                    --capabilities CAPABILITY_IAM \
                    --region ${AWS_REGION} \
                    --no-fail-on-empty-changeset
                  RC=$?
                  set -e
                  if [ "${RC}" -ne 0 ]; then
                    echo ""
                    echo "Refreshing AWS credentials (session may have expired during long deploy)..."
                    AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"
                    REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                    if [[ "${REQ_URL}" == *"?"* ]]; then REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"; else REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"; fi
                    HTTP_BODY=$(mktemp)
                    HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${REQ_URL}")
                    if [ "${HTTP_CODE}" = "200" ]; then
                      WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
                      rm -f "${HTTP_BODY}"
                      CREDS2=$(aws sts assume-role-with-web-identity \
                        --role-arn "${AWS_ROLE_ARN}" \
                        --role-session-name "gha-events-${{ github.run_id }}" \
                        --web-identity-token "${WEB_IDENTITY_TOKEN}" \
                        --duration-seconds 3600 \
                        --output json 2>/dev/null) && {
                        export AWS_ACCESS_KEY_ID=$(echo "${CREDS2}" | jq -r '.Credentials.AccessKeyId')
                        export AWS_SECRET_ACCESS_KEY=$(echo "${CREDS2}" | jq -r '.Credentials.SecretAccessKey')
                        export AWS_SESSION_TOKEN=$(echo "${CREDS2}" | jq -r '.Credentials.SessionToken')
                        echo "Credentials refreshed for diagnostics."
                      } || echo "::warning::Could not refresh credentials; event dump may fail with ExpiredToken."
                    else
                      rm -f "${HTTP_BODY}"
                      echo "::warning::OIDC refresh failed HTTP ${HTTP_CODE}; event dump may fail."
                    fi
                    echo ""
                    echo "::error::CloudFormation deploy failed. Root stack failure events (${STACK_NAME}):"
                    aws cloudformation describe-stack-events \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED' || ResourceStatus=='DELETE_FAILED'].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
                      --output table || true
                    echo ""
                    echo "Nested stack failure events (if any):"
                    for NESTED in $(aws cloudformation describe-stack-resources \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query "StackResources[?ResourceType=='AWS::CloudFormation::Stack'].PhysicalResourceId" \
                      --output text 2>/dev/null); do
                      [ -z "${NESTED}" ] && continue
                      echo "--- ${NESTED} ---"
                      aws cloudformation describe-stack-events \
                        --stack-name "${NESTED}" \
                        --region "${AWS_REGION}" \
                        --query "StackEvents[?ResourceStatus=='CREATE_FAILED' || ResourceStatus=='UPDATE_FAILED'].[Timestamp,LogicalResourceId,ResourceType,ResourceStatusReason]" \
                        --output table || true
                    done
                    exit "${RC}"
                  fi

            - name: Update ECS service with new image
              run: |
                  CLUSTER_NAME="${PROJECT_NAME}-cluster"
                  SERVICE_NAME="${PROJECT_NAME}-service"

                  # Force new deployment to pick up latest image
                  aws ecs update-service \
                    --cluster ${CLUSTER_NAME} \
                    --service ${SERVICE_NAME} \
                    --force-new-deployment \
                    --region ${AWS_REGION} || echo "Service update skipped (may not exist yet)"

            - name: Output deployment URLs
              run: |
                  echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Frontend URL: https://${FRONTEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
                  echo "Backend URL: https://${BACKEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
