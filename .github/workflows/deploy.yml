name: Deploy Full Stack Application

on:
    push:
        branches:
            - main
    workflow_dispatch:

env:
    AWS_REGION: us-east-1
    PROJECT_NAME: ${{ secrets.PROJECT_NAME || 'student-site' }}
    HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
    BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
    FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN || 'www' }}
    BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN || 'api' }}
    GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}

jobs:
    deploy:
        name: Deploy Infrastructure and Application
        runs-on: ubuntu-latest
        # One deploy at a time so a second run does not call `deploy` while the stack is CREATE_IN_PROGRESS.
        concurrency:
            group: cfn-fullstack-${{ github.repository }}
            cancel-in-progress: false
        permissions:
            id-token: write
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Avoid aws-actions/configure-aws-credentials (opaque errors). Same pattern as deploy-amplify.yml.
            - name: Check GitHub OIDC is available
              run: |
                  if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
                    echo "::error::OIDC env vars missing. Set repo Actions → Workflow permissions (Read and write) and id-token: write on the job."
                    exit 1
                  fi

            - name: Assume AWS role via GitHub OIDC
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set -euo pipefail
                  AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"
                  REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                  if [[ "${REQ_URL}" == *"?"* ]]; then
                    REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"
                  else
                    REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"
                  fi
                  echo "Fetching GitHub OIDC token..."
                  HTTP_BODY=$(mktemp)
                  HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" \
                    -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                    "${REQ_URL}")
                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "::error::GitHub OIDC token request failed HTTP ${HTTP_CODE}"
                    cat "${HTTP_BODY}"
                    exit 1
                  fi
                  WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
                  rm -f "${HTTP_BODY}"
                  if [ -z "${WEB_IDENTITY_TOKEN}" ] || [ "${WEB_IDENTITY_TOKEN}" = "null" ]; then
                    echo "::error::No JWT in OIDC response"
                    exit 1
                  fi
                  echo "Assuming role ${AWS_ROLE_ARN}..."
                  set +e
                  CREDS_JSON=$(aws sts assume-role-with-web-identity \
                    --role-arn "${AWS_ROLE_ARN}" \
                    --role-session-name "gha-deploy-${{ github.run_id }}" \
                    --web-identity-token "${WEB_IDENTITY_TOKEN}" \
                    --duration-seconds 3600 \
                    --output json 2>&1)
                  STS_RC=$?
                  set -e
                  if [ "${STS_RC}" -ne 0 ]; then
                    echo "::error::AssumeRoleWithWebIdentity failed:"
                    echo "${CREDS_JSON}"
                    exit 1
                  fi
                  AK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.AccessKeyId')
                  SK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SecretAccessKey')
                  ST=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SessionToken')
                  echo "::add-mask::${AK}"
                  echo "::add-mask::${SK}"
                  echo "::add-mask::${ST}"
                  echo "AWS_ACCESS_KEY_ID=${AK}" >> "${GITHUB_ENV}"
                  echo "AWS_SECRET_ACCESS_KEY=${SK}" >> "${GITHUB_ENV}"
                  echo "AWS_SESSION_TOKEN=${ST}" >> "${GITHUB_ENV}"
                  echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> "${GITHUB_ENV}"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Validate required deployment inputs
              run: |
                  set -euo pipefail
                  missing=0
                  for v in HOSTED_ZONE_ID BASE_DOMAIN FRONTEND_DOMAIN BACKEND_DOMAIN PROJECT_NAME; do
                    if [ -z "${!v:-}" ]; then
                      echo "::error::Missing required value: ${v}. Set it in repo Settings -> Secrets and variables -> Actions."
                      missing=1
                    fi
                  done
                  if [ "${missing}" -ne 0 ]; then
                    exit 1
                  fi

            - name: Install AWS CLI and CloudFormation dependencies
              run: |
                  pip install boto3 awscli

            - name: Create or verify artifacts bucket
              id: artifacts-bucket
              run: |
                  BUCKET_NAME="${PROJECT_NAME}-artifacts-$(aws sts get-caller-identity --query Account --output text)"

                  if aws s3 ls "s3://${BUCKET_NAME}" 2>&1 | grep -q 'NoSuchBucket'; then
                    echo "Creating artifacts bucket: ${BUCKET_NAME}"
                    aws s3 mb "s3://${BUCKET_NAME}" --region ${AWS_REGION}
                    aws s3api put-bucket-versioning \
                      --bucket "${BUCKET_NAME}" \
                      --versioning-configuration Status=Enabled
                  else
                    echo "Artifacts bucket already exists: ${BUCKET_NAME}"
                  fi

                  echo "bucket_name=${BUCKET_NAME}" >> $GITHUB_OUTPUT

            - name: Create or verify ECR repository
              id: ecr-repo
              run: |
                  REPO_NAME="${PROJECT_NAME}-backend"
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${REPO_NAME}"

                  if ! aws ecr describe-repositories --repository-names "${REPO_NAME}" --region ${AWS_REGION} 2>/dev/null; then
                    echo "Creating ECR repository: ${REPO_NAME}"
                    aws ecr create-repository \
                      --repository-name "${REPO_NAME}" \
                      --region ${AWS_REGION} \
                      --image-scanning-configuration scanOnPush=true
                  else
                    echo "ECR repository already exists: ${REPO_NAME}"
                  fi

                  echo "repository_uri=${REPO_URI}" >> $GITHUB_OUTPUT

            - name: Upload CloudFormation templates to S3
              run: |
                  aws s3 cp infrastructure/cloudformation/frontend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/frontend-stack.yml"
                  aws s3 cp infrastructure/cloudformation/backend-stack.yml \
                    "s3://${{ steps.artifacts-bucket.outputs.bucket_name }}/backend-stack.yml"

            # Run before Docker so long builds do not eat the wait budget. ACM/DNS/ECS can keep CREATE_IN_PROGRESS for an hour+.
            - name: Remove failed CloudFormation stack if needed
              run: |
                  set -e
                  STACK_NAME="${PROJECT_NAME}-main"
                  WAIT_SEC=30
                  MAX_WAIT_ROUNDS=240
                  round=0
                  get_stack_status() {
                    local out rc
                    set +e
                    out=$(aws cloudformation describe-stacks \
                      --stack-name "$STACK_NAME" \
                      --region "${AWS_REGION}" \
                      --query 'Stacks[0].StackStatus' \
                      --output text 2>&1)
                    rc=$?
                    set -e
                    if [ "${rc}" -eq 0 ]; then
                      echo "${out}"
                      return 0
                    fi
                    if echo "${out}" | grep -q 'does not exist'; then
                      echo "DOES_NOT_EXIST"
                      return 0
                    fi
                    if echo "${out}" | grep -q 'ExpiredToken'; then
                      echo "::error::AWS session expired during pre-check wait. Re-run workflow (credentials are intentionally short-lived)."
                      exit 1
                    fi
                    echo "::error::describe-stacks failed while waiting: ${out}"
                    exit 1
                  }
                  while true; do
                    STATUS=$(get_stack_status)
                    if [ "${STATUS}" = "DOES_NOT_EXIST" ]; then
                      echo "Stack ${STACK_NAME}: no stack; deploy will create it."
                      exit 0
                    fi
                    case "${STATUS}" in
                      *IN_PROGRESS)
                        round=$((round + 1))
                        if [ "${round}" -ge "${MAX_WAIT_ROUNDS}" ]; then
                          echo "::error::Stack still ${STATUS} after $((MAX_WAIT_ROUNDS * WAIT_SEC / 60)) minutes. Common causes: ACM certificate DNS validation pending, or a wedged create. Fix Route53 records or delete the stack from the console if rollback never finishes."
                          echo ""
                          echo "Recent root stack events (${STACK_NAME}):"
                          aws cloudformation describe-stack-events \
                            --stack-name "$STACK_NAME" \
                            --region "${AWS_REGION}" \
                            --max-items 30 \
                            --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceStatusReason]' \
                            --output table 2>/dev/null || true
                          echo ""
                          for NESTED in $(aws cloudformation describe-stack-resources \
                            --stack-name "$STACK_NAME" \
                            --region "${AWS_REGION}" \
                            --query "StackResources[?ResourceType=='AWS::CloudFormation::Stack'].PhysicalResourceId" \
                            --output text 2>/dev/null); do
                            [ -z "${NESTED}" ] && continue
                            echo "Nested stack events (${NESTED}):"
                            aws cloudformation describe-stack-events \
                              --stack-name "${NESTED}" \
                              --region "${AWS_REGION}" \
                              --max-items 20 \
                              --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceStatusReason]' \
                              --output table 2>/dev/null || true
                            echo ""
                          done
                          exit 1
                        fi
                        if [ "${round}" -eq 1 ] || [ $((round % 5)) -eq 0 ]; then
                          echo "Stack ${STACK_NAME} status: ${STATUS} — waited $((round * WAIT_SEC / 60))m / max $((MAX_WAIT_ROUNDS * WAIT_SEC / 60))m (${round}/${MAX_WAIT_ROUNDS})"
                        fi
                        sleep "${WAIT_SEC}"
                        ;;
                      *)
                        echo "Stack ${STACK_NAME} stable status: ${STATUS}"
                        break
                        ;;
                    esac
                  done

                  case "${STATUS}" in
                    ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED)
                      echo "Deleting stack (cannot update from ${STATUS})..."
                      aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "${AWS_REGION}"
                      if ! aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${AWS_REGION}"; then
                        echo "Normal delete failed. Retrying with FORCE_DELETE_STACK..."
                        aws cloudformation delete-stack \
                          --stack-name "$STACK_NAME" \
                          --region "${AWS_REGION}" \
                          --deletion-mode FORCE_DELETE_STACK
                        aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${AWS_REGION}"
                      fi
                      echo "Deleted (or force-deleted). Deploy step will create a fresh stack."
                      ;;
                    *)
                      echo "Proceeding with deploy (update existing stack or create if deleted above)."
                      ;;
                  esac

            - name: Refresh AWS role credentials before build/deploy
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set -euo pipefail
                  AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"
                  REQ_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                  if [[ "${REQ_URL}" == *"?"* ]]; then
                    REQ_URL="${REQ_URL}&audience=sts.amazonaws.com"
                  else
                    REQ_URL="${REQ_URL}?audience=sts.amazonaws.com"
                  fi
                  echo "Refreshing AWS credentials via GitHub OIDC..."
                  HTTP_BODY=$(mktemp)
                  HTTP_CODE=$(curl -sS -o "${HTTP_BODY}" -w "%{http_code}" \
                    -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                    "${REQ_URL}")
                  if [ "${HTTP_CODE}" != "200" ]; then
                    echo "::error::GitHub OIDC token request failed HTTP ${HTTP_CODE}"
                    cat "${HTTP_BODY}"
                    exit 1
                  fi
                  WEB_IDENTITY_TOKEN=$(jq -r '.value // empty' "${HTTP_BODY}")
                  rm -f "${HTTP_BODY}"
                  if [ -z "${WEB_IDENTITY_TOKEN}" ] || [ "${WEB_IDENTITY_TOKEN}" = "null" ]; then
                    echo "::error::No JWT in OIDC response"
                    exit 1
                  fi
                  CREDS_JSON=$(aws sts assume-role-with-web-identity \
                    --role-arn "${AWS_ROLE_ARN}" \
                    --role-session-name "gha-refresh-${{ github.run_id }}" \
                    --web-identity-token "${WEB_IDENTITY_TOKEN}" \
                    --duration-seconds 3600 \
                    --output json)
                  AK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.AccessKeyId')
                  SK=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SecretAccessKey')
                  ST=$(echo "${CREDS_JSON}" | jq -r '.Credentials.SessionToken')
                  echo "::add-mask::${AK}"
                  echo "::add-mask::${SK}"
                  echo "::add-mask::${ST}"
                  echo "AWS_ACCESS_KEY_ID=${AK}" >> "${GITHUB_ENV}"
                  echo "AWS_SECRET_ACCESS_KEY=${SK}" >> "${GITHUB_ENV}"
                  echo "AWS_SESSION_TOKEN=${ST}" >> "${GITHUB_ENV}"
                  echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> "${GITHUB_ENV}"

            - name: Build and push Docker image
              id: docker-build
              run: |
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REPO_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-backend"

                  # Login to ECR
                  aws ecr get-login-password --region ${AWS_REGION} | \
                    docker login --username AWS --password-stdin ${REPO_URI}

                  # Build Docker image
                  docker build -t ${PROJECT_NAME}-backend:latest ./backend
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:latest
                  docker tag ${PROJECT_NAME}-backend:latest ${REPO_URI}:${GITHUB_SHA}

                  # Push to ECR
                  docker push ${REPO_URI}:latest
                  docker push ${REPO_URI}:${GITHUB_SHA}

                  echo "image_uri=${REPO_URI}:latest" >> $GITHUB_OUTPUT

            # Stack may have entered CREATE_IN_PROGRESS during Docker (another run or long nested create). Deploy must not run until stable.
            - name: Wait for stack ready before deploy
              run: |
                  set -e
                  STACK_NAME="${PROJECT_NAME}-main"
                  WAIT_SEC=30
                  MAX_WAIT_ROUNDS=240
                  round=0
                  get_stack_status() {
                    local out rc
                    set +e
                    out=$(aws cloudformation describe-stacks \
                      --stack-name "$STACK_NAME" \
                      --region "${AWS_REGION}" \
                      --query 'Stacks[0].StackStatus' \
                      --output text 2>&1)
                    rc=$?
                    set -e
                    if [ "${rc}" -eq 0 ]; then
                      echo "${out}"
                      return 0
                    fi
                    if echo "${out}" | grep -q 'does not exist'; then
                      echo "DOES_NOT_EXIST"
                      return 0
                    fi
                    if echo "${out}" | grep -q 'ExpiredToken'; then
                      echo "::error::AWS session expired during pre-deploy wait. Re-run workflow or add another credential refresh step before this wait."
                      exit 1
                    fi
                    echo "::error::describe-stacks failed in pre-deploy wait: ${out}"
                    exit 1
                  }
                  while true; do
                    STATUS=$(get_stack_status)
                    if [ "${STATUS}" = "DOES_NOT_EXIST" ]; then
                      echo "No stack yet; deploy will create it."
                      exit 0
                    fi
                    case "${STATUS}" in
                      *IN_PROGRESS)
                        round=$((round + 1))
                        if [ "${round}" -ge "${MAX_WAIT_ROUNDS}" ]; then
                          echo "::error::Stack still ${STATUS} after $((MAX_WAIT_ROUNDS * WAIT_SEC / 60)) minutes (pre-deploy wait). Another job may be creating it, or ACM/ECS is still working."
                          exit 1
                        fi
                        if [ "${round}" -eq 1 ] || [ $((round % 5)) -eq 0 ]; then
                          echo "Pre-deploy wait: ${STATUS} — $((round * WAIT_SEC / 60))m / max $((MAX_WAIT_ROUNDS * WAIT_SEC / 60))m (${round}/${MAX_WAIT_ROUNDS})"
                        fi
                        sleep "${WAIT_SEC}"
                        ;;
                      *)
                        echo "Stack ready for deploy: ${STATUS}"
                        exit 0
                        ;;
                    esac
                  done

            - name: Deploy CloudFormation main stack
              env:
                  AWS_ASSUME_ROLE_ARN: ${{ secrets.GITHUB_ACTIONS_ROLE_ARN }}
              run: |
                  set -euo pipefail
                  STACK_NAME="${PROJECT_NAME}-main"
                  CHANGE_SET_NAME="${PROJECT_NAME}-main-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
                  WAIT_SEC=30
                  MAX_WAIT_ROUNDS=240
                  AWS_ROLE_ARN="${AWS_ASSUME_ROLE_ARN:-arn:aws:iam::286103605609:role/github-role}"

                  refresh_aws_credentials() {
                    local req_url http_body http_code web_token creds_json
                    req_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
                    if [[ "${req_url}" == *"?"* ]]; then
                      req_url="${req_url}&audience=sts.amazonaws.com"
                    else
                      req_url="${req_url}?audience=sts.amazonaws.com"
                    fi
                    http_body=$(mktemp)
                    http_code=$(curl -sS -o "${http_body}" -w "%{http_code}" \
                      -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
                      "${req_url}")
                    if [ "${http_code}" != "200" ]; then
                      echo "::error::OIDC token refresh failed HTTP ${http_code}"
                      cat "${http_body}"
                      rm -f "${http_body}"
                      return 1
                    fi
                    web_token=$(jq -r '.value // empty' "${http_body}")
                    rm -f "${http_body}"
                    if [ -z "${web_token}" ] || [ "${web_token}" = "null" ]; then
                      echo "::error::OIDC token refresh returned empty JWT"
                      return 1
                    fi
                    creds_json=$(aws sts assume-role-with-web-identity \
                      --role-arn "${AWS_ROLE_ARN}" \
                      --role-session-name "gha-refresh-${GITHUB_RUN_ID}" \
                      --web-identity-token "${web_token}" \
                      --duration-seconds 3600 \
                      --output json)
                    export AWS_ACCESS_KEY_ID=$(echo "${creds_json}" | jq -r '.Credentials.AccessKeyId')
                    export AWS_SECRET_ACCESS_KEY=$(echo "${creds_json}" | jq -r '.Credentials.SecretAccessKey')
                    export AWS_SESSION_TOKEN=$(echo "${creds_json}" | jq -r '.Credentials.SessionToken')
                    echo "::add-mask::${AWS_ACCESS_KEY_ID}"
                    echo "::add-mask::${AWS_SECRET_ACCESS_KEY}"
                    echo "::add-mask::${AWS_SESSION_TOKEN}"
                    echo "AWS credentials refreshed."
                  }

                  aws_cf() {
                    local out rc
                    set +e
                    out=$(aws "$@" 2>&1)
                    rc=$?
                    set -e
                    if [ "${rc}" -eq 0 ]; then
                      printf '%s' "${out}"
                      return 0
                    fi
                    if echo "${out}" | grep -q 'ExpiredToken'; then
                      echo "AWS token expired; refreshing and retrying command..." >&2
                      refresh_aws_credentials >&2
                      out=$(aws "$@" 2>&1)
                      rc=$?
                    fi
                    if [ "${rc}" -ne 0 ]; then
                      echo "::error::AWS command failed: aws $*" >&2
                      echo "${out}" >&2
                      return "${rc}"
                    fi
                    printf '%s' "${out}"
                  }

                  show_failure_diagnostics() {
                    echo ""
                    echo "::error::CloudFormation deploy failed (${STACK_NAME})."
                    echo "Root stack status:"
                    aws_cf cloudformation describe-stacks \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query 'Stacks[0].[StackStatus,StackStatusReason]' \
                      --output text || true
                    echo ""
                    echo "Root stack events with FAILED status (if any):"
                    aws_cf cloudformation describe-stack-events \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]" \
                      --output table || true
                    echo ""
                    echo "Root stack — last 35 events (newest first):"
                    aws_cf cloudformation describe-stack-events \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --max-items 35 \
                      --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]' \
                      --output table || true
                    echo ""
                    echo "Nested stacks (events with FAILED + recent tail):"
                    for NESTED in $(aws_cf cloudformation describe-stack-resources \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query "StackResources[?ResourceType=='AWS::CloudFormation::Stack'].PhysicalResourceId" \
                      --output text 2>/dev/null); do
                      [ -z "${NESTED}" ] && continue
                      echo "--- ${NESTED} ---"
                      aws_cf cloudformation describe-stack-events \
                        --stack-name "${NESTED}" \
                        --region "${AWS_REGION}" \
                        --query "StackEvents[?contains(ResourceStatus, 'FAILED')].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]" \
                        --output table || true
                      aws_cf cloudformation describe-stack-events \
                        --stack-name "${NESTED}" \
                        --region "${AWS_REGION}" \
                        --max-items 25 \
                        --query 'StackEvents[].[Timestamp,ResourceStatus,LogicalResourceId,ResourceType,ResourceStatusReason]' \
                        --output table || true
                    done
                  }

                  echo "Creating CloudFormation change set ${CHANGE_SET_NAME}..."
                  CS_OUT=$(aws_cf cloudformation create-change-set \
                    --stack-name "${STACK_NAME}" \
                    --change-set-name "${CHANGE_SET_NAME}" \
                    --change-set-type UPDATE \
                    --template-body file://infrastructure/cloudformation/main.yml \
                    --parameters \
                      ParameterKey=ProjectName,ParameterValue="${PROJECT_NAME}" \
                      ParameterKey=HostedZoneId,ParameterValue="${HOSTED_ZONE_ID}" \
                      ParameterKey=FrontendDomain,ParameterValue="${FRONTEND_DOMAIN}" \
                      ParameterKey=BackendDomain,ParameterValue="${BACKEND_DOMAIN}" \
                      ParameterKey=BaseDomain,ParameterValue="${BASE_DOMAIN}" \
                      ParameterKey=TemplatesBucketName,ParameterValue="${{ steps.artifacts-bucket.outputs.bucket_name }}" \
                      ParameterKey=ECRRepositoryUri,ParameterValue="${{ steps.ecr-repo.outputs.repository_uri }}" \
                    --capabilities CAPABILITY_IAM \
                    --region "${AWS_REGION}" 2>&1) || {
                      if echo "${CS_OUT}" | grep -q 'does not exist'; then
                        echo "Stack does not exist yet; creating change set as CREATE."
                        aws_cf cloudformation create-change-set \
                          --stack-name "${STACK_NAME}" \
                          --change-set-name "${CHANGE_SET_NAME}" \
                          --change-set-type CREATE \
                          --template-body file://infrastructure/cloudformation/main.yml \
                          --parameters \
                            ParameterKey=ProjectName,ParameterValue="${PROJECT_NAME}" \
                            ParameterKey=HostedZoneId,ParameterValue="${HOSTED_ZONE_ID}" \
                            ParameterKey=FrontendDomain,ParameterValue="${FRONTEND_DOMAIN}" \
                            ParameterKey=BackendDomain,ParameterValue="${BACKEND_DOMAIN}" \
                            ParameterKey=BaseDomain,ParameterValue="${BASE_DOMAIN}" \
                            ParameterKey=TemplatesBucketName,ParameterValue="${{ steps.artifacts-bucket.outputs.bucket_name }}" \
                            ParameterKey=ECRRepositoryUri,ParameterValue="${{ steps.ecr-repo.outputs.repository_uri }}" \
                          --capabilities CAPABILITY_IAM \
                          --region "${AWS_REGION}" >/dev/null
                      else
                        echo "${CS_OUT}"
                        show_failure_diagnostics
                        exit 1
                      fi
                    }

                  round=0
                  while true; do
                    round=$((round + 1))
                    CS_STATUS=$(aws_cf cloudformation describe-change-set \
                      --stack-name "${STACK_NAME}" \
                      --change-set-name "${CHANGE_SET_NAME}" \
                      --region "${AWS_REGION}" \
                      --query 'Status' \
                      --output text)
                    CS_REASON=$(aws_cf cloudformation describe-change-set \
                      --stack-name "${STACK_NAME}" \
                      --change-set-name "${CHANGE_SET_NAME}" \
                      --region "${AWS_REGION}" \
                      --query 'StatusReason' \
                      --output text)
                    case "${CS_STATUS}" in
                      CREATE_COMPLETE)
                        echo "Change set ready."
                        break
                        ;;
                      FAILED)
                        if echo "${CS_REASON}" | grep -q "didn't contain changes"; then
                          echo "No CloudFormation changes to deploy."
                          exit 0
                        fi
                        echo "::error::Change set creation failed: ${CS_REASON}"
                        show_failure_diagnostics
                        exit 1
                        ;;
                      CREATE_PENDING|CREATE_IN_PROGRESS)
                        if [ "${round}" -eq 1 ] || [ $((round % 5)) -eq 0 ]; then
                          echo "Waiting for change set: ${CS_STATUS} (${round})"
                        fi
                        if [ "${round}" -ge "${MAX_WAIT_ROUNDS}" ]; then
                          echo "::error::Timed out waiting for change set creation."
                          show_failure_diagnostics
                          exit 1
                        fi
                        sleep "${WAIT_SEC}"
                        ;;
                      *)
                        echo "::error::Unexpected change set status: ${CS_STATUS} (${CS_REASON})"
                        show_failure_diagnostics
                        exit 1
                        ;;
                    esac
                  done

                  echo "Executing change set ${CHANGE_SET_NAME}..."
                  aws_cf cloudformation execute-change-set \
                    --stack-name "${STACK_NAME}" \
                    --change-set-name "${CHANGE_SET_NAME}" \
                    --region "${AWS_REGION}" >/dev/null

                  round=0
                  while true; do
                    round=$((round + 1))
                    STATUS=$(aws_cf cloudformation describe-stacks \
                      --stack-name "${STACK_NAME}" \
                      --region "${AWS_REGION}" \
                      --query 'Stacks[0].StackStatus' \
                      --output text)
                    case "${STATUS}" in
                      *IN_PROGRESS)
                        if [ "${round}" -eq 1 ] || [ $((round % 5)) -eq 0 ]; then
                          echo "Deploy status: ${STATUS} — waited $((round * WAIT_SEC / 60))m (${round})"
                        fi
                        if [ "${round}" -ge "${MAX_WAIT_ROUNDS}" ]; then
                          echo "::error::Timed out waiting for stack deploy completion."
                          show_failure_diagnostics
                          exit 1
                        fi
                        sleep "${WAIT_SEC}"
                        ;;
                      CREATE_COMPLETE|UPDATE_COMPLETE)
                        echo "CloudFormation deploy complete: ${STATUS}"
                        break
                        ;;
                      *)
                        echo "::error::CloudFormation finished in non-success status: ${STATUS}"
                        show_failure_diagnostics
                        exit 1
                        ;;
                    esac
                  done

            - name: Update ECS service with new image
              run: |
                  CLUSTER_NAME="${PROJECT_NAME}-cluster"
                  SERVICE_NAME="${PROJECT_NAME}-service"

                  # Force new deployment to pick up latest image
                  aws ecs update-service \
                    --cluster ${CLUSTER_NAME} \
                    --service ${SERVICE_NAME} \
                    --force-new-deployment \
                    --region ${AWS_REGION} || echo "Service update skipped (may not exist yet)"

            - name: Output deployment URLs
              run: |
                  echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Frontend URL: https://${FRONTEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
                  echo "Backend URL: https://${BACKEND_DOMAIN}.${BASE_DOMAIN}" >> $GITHUB_STEP_SUMMARY
